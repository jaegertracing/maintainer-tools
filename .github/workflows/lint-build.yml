name: 'Lint and Build'

on:
  merge_group:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ (github.event.pull_request && github.event.pull_request.number) || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          cache: npm
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run build

      # The committed `pr-nudge/dist/index.js` is the artifact users pin via
      # `uses: jaegertracing/maintainer-tools/pr-nudge@vX.Y.Z`. Fail the build
      # if it drifted from source — otherwise consumers would get stale code.
      - name: Ensure pr-nudge/dist is in sync with src
        run: |
          if ! git diff --quiet --exit-code -- pr-nudge/dist; then
            echo "::error::pr-nudge/dist/ is out of date. Run \`npm run build\` and commit the result."
            git --no-pager diff -- pr-nudge/dist | head -200
            exit 1
          fi

  validate-3rd-party-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          submodules: false

      - name: validate Renovate config
        run: |
          docker run \
            -v $PWD/renovate.json:/usr/src/app/renovate.json \
            ghcr.io/renovatebot/renovate:latest \
            renovate-config-validator
